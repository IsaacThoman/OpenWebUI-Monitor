services:
    app:
        ports:
            - '3000:3000'
        command: >-
            sh -c "
            echo 'Waiting for PostgreSQL to start...' &&
            while ! nc -z ${POSTGRES_HOST:-db} ${POSTGRES_PORT:-5432}; do sleep 1; done &&
            echo 'PostgreSQL is up!' &&
            echo 'Creating database if not exists...' &&
            PGPASSWORD=${POSTGRES_PASSWORD:-openwebui} psql -h ${POSTGRES_HOST:-db} -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-postgres} -tc \"SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_DATABASE:-openwebui_monitor}'\" | grep -q 1 ||
            PGPASSWORD=${POSTGRES_PASSWORD:-openwebui} psql -h ${POSTGRES_HOST:-db} -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-postgres} -c \"CREATE DATABASE ${POSTGRES_DATABASE:-openwebui_monitor}\" &&
            echo 'Database setup completed!' &&
            sleep 2 &&
            echo 'Initializing database tables...' &&
            pnpm exec tsx -e \"import('./lib/db/client').then(async (mod) => { await mod.default.ensureTablesExist(); process.exit(0) })\" &&
            echo 'Starting Next.js dev server...' &&
            pnpm dev --hostname 0.0.0.0 --port 3000
            "
        environment:
            - WATCHPACK_POLLING=true
            - CHOKIDAR_USEPOLLING=true
        volumes:
            - .:/app
            - app_node_modules:/app/node_modules
            - app_next:/app/.next

volumes:
    app_node_modules:
    app_next:
